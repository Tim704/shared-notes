# Shared Notes — cloudflared routes notes.timhufnagel.org → 127.0.0.1:3002.
services:
  notes:
    build: .
    image: shared-notes:latest
    container_name: shared-notes
    restart: unless-stopped
    volumes:
      - ./data:/app/data               # board.bin persists (in-place writes, existing notes preserved)
    ports:
      - "127.0.0.1:3002:3002"
    mem_limit: 192m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3002/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
